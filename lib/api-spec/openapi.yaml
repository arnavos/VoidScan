                $ref: "#/components/schemas/NetworkMapResult"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    TargetInput:
      type: object
      required: [target]
      properties:
        target:
          type: string

    FileDataInput:
      type: object
      required: [filename, data]
      properties:
        filename:
          type: string
        data:
          type: string
          description: Base64 encoded file content
        mimeType:
          type: ["string", "null"]

    PasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    PasswordGenerateInput:
      type: object
      properties:
        length:
          type: ["integer", "null"]
        includeUppercase:
          type: ["boolean", "null"]
        includeLowercase:
          type: ["boolean", "null"]
        includeNumbers:
          type: ["boolean", "null"]
        includeSymbols:
          type: ["boolean", "null"]

    PassphraseInput:
      type: object
      properties:
        wordCount:
          type: ["integer", "null"]
        separator:
          type: ["string", "null"]

    PortScanInput:
      type: object
      required: [target]
      properties:
        target:
          type: string
        portRange:
          type: ["string", "null"]
          description: "e.g. '1-1024' or '80,443,8080'"

    BannerInput:
      type: object
      required: [target, port]
      properties:
        target:
          type: string
        port:
          type: integer

    HashCompareInput:
      type: object
      required: [hash1, hash2]
      properties:
        hash1:
          type: string
        hash2:
          type: string

    YaraInput:
      type: object
      required: [data, rule]
      properties:
        data:
          type: string
          description: Base64 encoded content to scan
        rule:
          type: string
          description: YARA rule text

    GenericResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]
        message:
          type: ["string", "null"]

    WhoisResult:
      type: object
      required: [success, target]
      properties:
        success:
          type: boolean
        target:
          type: string
        raw:
          type: ["string", "null"]
        registrar:
          type: ["string", "null"]
        createdDate:
          type: ["string", "null"]
        expiresDate:
          type: ["string", "null"]
        updatedDate:
          type: ["string", "null"]
        nameservers:
          type: array
          items:
            type: string
        status:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]

    DnsResult:
      type: object
      required: [success, target]
      properties:
        success:
          type: boolean
        target:
          type: string
        records:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]

    AsnResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        ip:
          type: ["string", "null"]
        asn:
          type: ["string", "null"]
        org:
          type: ["string", "null"]
        isp:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    GeoipResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        ip:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        countryCode:
          type: ["string", "null"]
        region:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lon:
          type: ["number", "null"]
        isp:
          type: ["string", "null"]
        org:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    SslResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        host:
          type: ["string", "null"]
        subject:
          type: object
          additionalProperties: true
        issuer:
          type: object
          additionalProperties: true
        validFrom:
          type: ["string", "null"]
        validTo:
          type: ["string", "null"]
        daysRemaining:
          type: ["integer", "null"]
        isExpired:
          type: ["boolean", "null"]
        protocol:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        fingerprint:
          type: ["string", "null"]
        subjectAltNames:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]

    HeadersResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        url:
          type: ["string", "null"]
        statusCode:
          type: ["integer", "null"]
        headers:
          type: object
          additionalProperties: true
        securityHeaders:
          type: object
          additionalProperties: true
        missingSecurityHeaders:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]

    TechDetectResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        url:
          type: ["string", "null"]
        technologies:
          type: array
          items:
            type: object
            additionalProperties: true
        error:
          type: ["string", "null"]

    SubdomainResult:
      type: object
      required: [success, target]
      properties:
        success:
          type: boolean
        target:
          type: string
        subdomains:
          type: array
          items:
            type: object
            additionalProperties: true
        count:
          type: integer
        error:
          type: ["string", "null"]

    ScreenshotResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        url:
          type: ["string", "null"]
        screenshotUrl:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    ReputationResult:
      type: object
      required: [success, target]
      properties:
        success:
          type: boolean
        target:
          type: string
        score:
          type: ["integer", "null"]
        verdict:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: object
            additionalProperties: true
        error:
          type: ["string", "null"]

    PhishingResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        url:
          type: ["string", "null"]
        isPhishing:
          type: ["boolean", "null"]
        confidence:
          type: ["number", "null"]
        indicators:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]

    SuspiciousUrlResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        url:
          type: ["string", "null"]
        riskScore:
          type: ["integer", "null"]
        riskLevel:
          type: ["string", "null"]
        flags:
          type: array
          items:
            type: string
        details:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]

    VirusTotalResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        target:
          type: ["string", "null"]
        positives:
          type: ["integer", "null"]
        total:
          type: ["integer", "null"]
        scanDate:
          type: ["string", "null"]
        permalink:
          type: ["string", "null"]
        scans:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]
        requiresApiKey:
          type: ["boolean", "null"]

    AbuseIpdbResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        ip:
          type: ["string", "null"]
        abuseConfidenceScore:
          type: ["integer", "null"]
        totalReports:
          type: ["integer", "null"]
        lastReportedAt:
          type: ["string", "null"]
        countryCode:
          type: ["string", "null"]
        isp:
          type: ["string", "null"]
        categories:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]
        requiresApiKey:
          type: ["boolean", "null"]

    BreachResult:
      type: object
      required: [success]
