          description: Password strength result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordStrengthResult"

  /password/breach:
    post:
      operationId: passwordBreach
      tags: [password]
      summary: Password Breach Checker
      requestBody:
        required: true
