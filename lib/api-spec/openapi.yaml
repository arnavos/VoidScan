              $ref: "#/components/schemas/PasswordInput"
      responses:
        "200":
          description: Entropy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordEntropyResult"

  /password/generate:
    post:
      operationId: passwordGenerate
      tags: [password]
      summary: Random Password Generator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordGenerateInput"
      responses:
        "200":
          description: Generated password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordGenerateResult"

  /password/passphrase:
    post:
      operationId: passwordPassphrase
      tags: [password]
