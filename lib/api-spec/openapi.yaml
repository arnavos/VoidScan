openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VoidScan Security Operations Centre API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recon
    description: Reconnaissance module
  - name: threat
    description: Threat intelligence module
  - name: file
    description: File analysis module
  - name: password
    description: Password security module
  - name: network
    description: Network analysis module

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Reconnaissance ────────────────────────────────────────────────────────
  /recon/whois:
    post:
      operationId: reconWhois
      tags: [recon]
      summary: WHOIS lookup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetInput"
      responses:
        "200":
          description: WHOIS result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhoisResult"

  /recon/dns:
    post:
      operationId: reconDns
      tags: [recon]
      summary: DNS enumeration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetInput"
      responses:
