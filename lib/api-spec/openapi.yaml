          application/json:
            schema:
              $ref: "#/components/schemas/PassphraseInput"
      responses:
        "200":
          description: Generated passphrase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassphraseResult"

  # ─── Network Analysis ──────────────────────────────────────────────────────
  /network/port-scan:
    post:
      operationId: networkPortScan
      tags: [network]
      summary: Port Scanner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortScanInput"
      responses:
        "200":
          description: Port scan result
          content:
            application/json:
              schema:
