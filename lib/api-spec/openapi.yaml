  /network/ping:
    post:
      operationId: networkPing
      tags: [network]
      summary: Ping Sweeper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetInput"
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResult"

  /network/traceroute:
    post:
      operationId: networkTraceroute
      tags: [network]
